name: cadiz_tren_bus_tranvia_catamaran
description: "Proyecto con horarios del transporte público en la provincia de Cádiz"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.3
  path: ^1.9.0
  sqlite3: ^2.9.4
  flex_color_scheme: ^8.4.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  riverpod_generator: ^2.6.5
  build_runner: ^2.5.4
  drift_dev: ^2.28.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/cadiz_transit.sqlite
